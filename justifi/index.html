<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — World Cup 2026 Pick’em</title>
<meta name="description" content="World Cup 2026 group + knockout pick'em — make your picks and climb the live leaderboard. 7–1, never forget.">
<meta property="og:type" content="website">
<meta property="og:title" content="World Cup 2026 Pick’em — Live Leaderboard">
<meta property="og:description" content="Make your group + knockout picks and climb the board. 7–1, never forget. 🇧🇷">
<meta property="og:image" content="https://pete2786.github.io/world-cup-26/shared/seven-one.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="World Cup 2026 Pick’em — Live Leaderboard">
<meta name="twitter:description" content="Make your group + knockout picks and climb the board. 7–1, never forget. 🇧🇷">
<meta name="twitter:image" content="https://pete2786.github.io/world-cup-26/shared/seven-one.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/leaderboard.css">
</head>
<body>
<div class="wrap">
  <figure class="toplogo-wrap">
    <img class="toplogo" src="../shared/seven-one.png" alt="Brazil fans consoling each other while holding the World Cup trophy — a 7–1 tribute" loading="eager">
    <figcaption class="toplogo-cap">7–1 · never forget</figcaption>
  </figure>
  <header>
    <div class="kicker">FIFA World Cup • Live Standings</div>
    <h1>Leaderboard <span class="yr">’26</span></h1>
    <div id="poolBadge" class="poolbadge"></div>
    <nav class="poolnav">
      <a class="navbtn" href="./group.html">Group Stage Picks</a>
      <a class="navbtn locked" id="koLink" href="./bracket.html" aria-disabled="true">Knockout Bracket <span class="lock">🔒</span></a>
    </nav>
  </header>

  <section id="info" class="info"></section>

  <section class="board">
    <h2>Group Stage <span id="gCount" class="count"></span></h2><div class="hr"></div>
    <div id="gBoard" class="rowlist"><div class="empty">Loading…</div></div>
  </section>

  <section class="board">
    <h2>Knockout <span id="kCount" class="count"></span></h2><div class="hr"></div>
    <div id="kBoard" class="rowlist"><div class="empty">Loading…</div></div>
  </section>

  <div class="foot">
    <span><span class="dotlive"></span><span id="status">updating…</span></span>
    <button class="refresh" id="refreshBtn">Refresh</button>
  </div>
</div>
<script src="./config.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/leaderboard.js"></script>
</body>
</html>
